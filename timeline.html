<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insidestory — Room Design Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #08080a;
            --text: #f5f0eb;
            --accent: #c9a96e;
            --muted: #6a655f;
            --dim: #333;
            --font-head: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --font-accent: 'Cormorant Garamond', serif;
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        .cursor-dot {
            position: fixed;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor-ring {
            position: fixed;
            width: 35px;
            height: 35px;
            border: 1px solid rgba(201, 169, 110, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .back-link {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 200;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .page-title {
            position: fixed;
            top: 2rem;
            right: 2rem;
            text-align: right;
            z-index: 200;
        }

        .page-title-the {
            display: block;
            font-family: var(--font-accent);
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .page-title-name {
            font-family: var(--font-head);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .scroll-spacer {
            height: 700vh;
        }

        /* ── ROOM CANVAS ── */
        .room-canvas {
            position: fixed;
            bottom: 8vh;
            left: 50%;
            transform: translateX(-50%);
            width: 58vw;
            max-width: 780px;
            height: 52vh;
            z-index: 10;
            pointer-events: none;
        }

        .rc-back-wall {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #f0e6d8, #e8ddd0, #ddd2c4);
            border-radius: 3px;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.06);
        }

        .rc-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18%;
            background:
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 55px),
                linear-gradient(180deg, #c4a882, #b5956b);
        }

        /* ── SVG BLUEPRINT LAYER ── */
        .blueprint-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .blueprint-layer svg {
            width: 100%;
            height: 100%;
        }

        .bp-struct {
            fill: none;
            stroke: var(--accent);
            stroke-width: 0.8;
            opacity: 0;
        }

        .bp-dim {
            fill: none;
            stroke: rgba(201, 169, 110, 0.3);
            stroke-width: 0.4;
            stroke-dasharray: 3 2;
            opacity: 0;
        }

        .bp-label {
            fill: var(--accent);
            font-size: 5px;
            font-family: var(--font-body);
            letter-spacing: 1.5px;
            opacity: 0;
        }

        /* ── FURNITURE ELEMENTS ── */
        .rc-element {
            position: absolute;
            opacity: 0;
            transform: translateY(15px) scale(0.9);
            z-index: 10;
        }

        /* Accent wall */
        .rc-accent-wall {
            top: 0;
            left: 0;
            width: 38%;
            height: 82%;
            background: linear-gradient(180deg, #2c3830, #374840, #2c3830);
        }

        /* Molding */
        .rc-molding {
            bottom: 18%;
            left: 0;
            width: 100%;
            height: 1.5%;
            background: linear-gradient(180deg, #c0b09a, #a89880);
        }

        /* Window */
        .rc-window {
            top: 8%;
            right: 6%;
            width: 20%;
            height: 48%;
            border: 5px solid #bfad96;
            background: linear-gradient(180deg, #87CEEB, #b0d8ee, #d4ebf5);
        }

        .rc-window::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: #bfad96;
            transform: translateX(-50%);
        }

        .rc-window::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #bfad96;
            transform: translateY(-50%);
        }

        /* Curtains */
        .rc-curtain-l {
            top: 5%;
            right: 26%;
            width: 5%;
            height: 55%;
            background: linear-gradient(90deg, rgba(201, 169, 110, 0.2), rgba(201, 169, 110, 0.06));
            border-radius: 0 0 0 15px;
        }

        .rc-curtain-r {
            top: 5%;
            right: 0%;
            width: 5%;
            height: 55%;
            background: linear-gradient(270deg, rgba(201, 169, 110, 0.2), rgba(201, 169, 110, 0.06));
            border-radius: 0 0 15px 0;
        }

        /* Rug */
        .rc-rug {
            bottom: 3%;
            left: 14%;
            width: 52%;
            height: 10%;
            background: linear-gradient(90deg, var(--accent), #d4b87e, var(--accent));
            border-radius: 50%;
            opacity: 0;
        }

        /* Sofa */
        .rc-sofa {
            bottom: 18%;
            left: 8%;
            width: 30%;
            height: 17%;
        }

        .rc-sofa-back {
            position: absolute;
            top: 0;
            left: 2%;
            width: 96%;
            height: 32%;
            background: linear-gradient(180deg, #6a8a7a, #5a7a6a);
            border-radius: 5px 5px 0 0;
        }

        .rc-sofa-seat {
            position: absolute;
            top: 30%;
            width: 100%;
            height: 35%;
            background: linear-gradient(180deg, #7a9a8a, #6a8a7a);
            border-radius: 3px;
        }

        .rc-sofa-base {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(180deg, #5a7a6a, #4a6a5a);
            border-radius: 0 0 3px 3px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .rc-sofa-pillow1 {
            position: absolute;
            top: 8%;
            left: 8%;
            width: 14%;
            height: 28%;
            background: var(--accent);
            border-radius: 5px;
        }

        .rc-sofa-pillow2 {
            position: absolute;
            top: 8%;
            right: 8%;
            width: 14%;
            height: 28%;
            background: #d4a0a0;
            border-radius: 5px;
        }

        /* Coffee table */
        .rc-table {
            bottom: 18%;
            left: 28%;
            width: 15%;
            height: 7%;
        }

        .rc-table-top {
            position: absolute;
            top: 0;
            width: 100%;
            height: 28%;
            background: linear-gradient(90deg, #5a3d2b, #7a5740, #5a3d2b);
            border-radius: 2px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
        }

        .rc-table-legs {
            position: absolute;
            bottom: 0;
            left: 12%;
            width: 76%;
            height: 72%;
            border-left: 2px solid #444;
            border-right: 2px solid #444;
        }

        /* Bookshelf */
        .rc-bookshelf {
            bottom: 18%;
            right: 22%;
            width: 11%;
            height: 28%;
        }

        .rc-shelf-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4a3020, #6a5040, #4a3020);
            border-radius: 2px;
            position: relative;
            box-shadow: 1px 2px 8px rgba(0, 0, 0, 0.25);
        }

        .rc-shelf-row {
            position: absolute;
            width: 80%;
            left: 10%;
            display: flex;
            gap: 1px;
            align-items: flex-end;
        }

        .rc-shelf-row:nth-child(1) {
            bottom: 76%;
            height: 18%;
        }

        .rc-shelf-row:nth-child(2) {
            bottom: 51%;
            height: 20%;
        }

        .rc-shelf-row:nth-child(3) {
            bottom: 26%;
            height: 18%;
        }

        .rc-shelf-row:nth-child(4) {
            bottom: 2%;
            height: 20%;
        }

        .rc-book {
            flex: 1;
            border-radius: 1px;
            min-width: 3px;
        }

        /* TV */
        .rc-tv {
            bottom: 18%;
            right: 8%;
            width: 16%;
            height: 18%;
        }

        .rc-tv-screen {
            position: absolute;
            bottom: 38%;
            left: 10%;
            width: 80%;
            height: 55%;
            background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
            border: 2px solid #222;
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(15, 52, 96, 0.25);
        }

        .rc-tv-cabinet {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 34%;
            background: linear-gradient(180deg, #4a3522, #3d2b1a);
            border-radius: 2px;
        }

        /* Lamp */
        .rc-lamp {
            bottom: 18%;
            left: 4%;
            width: 4.5%;
            height: 24%;
        }

        .rc-lamp-shade {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 16%;
            background: linear-gradient(180deg, #f5e6d0, #e8d5b8);
            clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
        }

        .rc-lamp-pole {
            position: absolute;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            width: 5%;
            height: 78%;
            background: linear-gradient(90deg, #666, #999, #666);
        }

        .rc-lamp-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 4%;
            background: #555;
            border-radius: 2px;
        }

        .rc-lamp-glow {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 280%;
            height: 180%;
            background: radial-gradient(ellipse, rgba(255, 220, 150, 0.1), transparent 60%);
            pointer-events: none;
        }

        /* Art */
        .rc-art {
            top: 10%;
            left: 16%;
            width: 12%;
            height: 14%;
        }

        .rc-art-frame {
            width: 100%;
            height: 100%;
            border: 2px solid #8a7a6a;
            background: linear-gradient(135deg, #3a3025, #5a4a3a);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 2px 8px rgba(0, 0, 0, 0.25);
        }

        .rc-art-inner {
            width: 80%;
            height: 75%;
            background: linear-gradient(135deg, #c9a96e, #e8d5b8, #c9a96e);
        }

        /* Plant */
        .rc-plant {
            bottom: 18%;
            right: 4%;
            width: 4.5%;
            height: 12%;
        }

        .rc-pot {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            height: 32%;
            background: linear-gradient(180deg, #c67b5c, #a65d3f);
            clip-path: polygon(10% 0, 90% 0, 80% 100%, 20% 100%);
        }

        .rc-foliage {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 110%;
            height: 80%;
            background: radial-gradient(ellipse, #4a8a5a, #3a7a4a 50%, transparent 72%);
            border-radius: 50%;
        }

        /* ── STEP INFO ── */
        .step-info {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            width: 85%;
            max-width: 550px;
        }

        .step-number {
            font-family: var(--font-accent);
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
            letter-spacing: 0.3em;
        }

        .step-title {
            font-family: var(--font-head);
            font-size: clamp(1.3rem, 2.8vw, 2rem);
            font-weight: 400;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .step-title em {
            color: var(--accent);
            font-style: italic;
        }

        .step-desc {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto;
        }

        /* ── MATERIAL SWATCH ── */
        .material-swatch {
            position: fixed;
            left: 3rem;
            bottom: 12vh;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .material-swatch.visible {
            opacity: 1;
        }

        .ms-label {
            font-size: 0.5rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .ms-color {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.3);
            margin-bottom: 0.2rem;
        }

        .ms-name {
            font-size: 0.55rem;
            color: var(--muted);
        }

        /* ── TIMELINE BAR ── */
        .timeline-bar {
            position: fixed;
            bottom: 3.5vh;
            left: 8%;
            width: 84%;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 1px;
            z-index: 100;
        }

        .timeline-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 1px;
        }

        .timeline-markers {
            position: fixed;
            bottom: 5vh;
            left: 8%;
            width: 84%;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .tl-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            opacity: 0.2;
            transition: opacity 0.5s;
        }

        .tl-marker.active {
            opacity: 1;
        }

        .tl-marker-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid var(--dim);
            background: transparent;
            transition: all 0.4s;
        }

        .tl-marker.active .tl-marker-dot {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(201, 169, 110, 0.4);
        }

        .tl-marker-label {
            font-size: 0.48rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }

        .scroll-hint {
            position: fixed;
            bottom: 1vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--dim);
            z-index: 100;
        }

        @media (max-width: 768px) {
            .room-canvas {
                width: 90vw;
                height: 42vh;
                bottom: 10vh;
            }

            .timeline-markers {
                display: none;
            }

            .material-swatch {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <a href="index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" />
        </svg>
        Back
    </a>
    <div class="page-title">
        <span class="page-title-the">The</span>
        <span class="page-title-name">Insidestory</span>
    </div>

    <div class="particles" id="particles"></div>
    <div class="scroll-spacer"></div>

    <div class="room-canvas" id="roomCanvas">
        <div class="rc-back-wall"></div>
        <div class="rc-floor"></div>

        <!-- SVG Blueprint Layer -->
        <div class="blueprint-layer" id="blueprintLayer">
            <svg viewBox="0 0 780 520">
                <!-- Room outline -->
                <rect class="bp-struct" id="bpFrame" x="5" y="5" width="770" height="510" rx="2" />
                <!-- Accent wall zone -->
                <rect class="bp-struct" id="bpAccent" x="5" y="5" width="296" height="418" />
                <!-- Window -->
                <rect class="bp-struct" id="bpWindow" x="580" y="42" width="156" height="250" />
                <!-- Furniture outlines -->
                <rect class="bp-struct" id="bpSofa" x="62" y="348" width="234" height="88" rx="3" />
                <rect class="bp-struct" id="bpTable" x="218" y="370" width="117" height="36" />
                <rect class="bp-struct" id="bpShelf" x="480" y="268" width="86" height="146" />
                <rect class="bp-struct" id="bpTV" x="580" y="312" width="125" height="94" />
                <rect class="bp-struct" id="bpLamp" x="20" y="268" width="35" height="125" />
                <rect class="bp-struct" id="bpArt" x="125" y="52" width="94" height="73" />
                <!-- Dimensions -->
                <line class="bp-dim" id="bpDimW" x1="5" y1="520" x2="775" y2="520" />
                <line class="bp-dim" id="bpDimH" x1="780" y1="5" x2="780" y2="515" />
                <text class="bp-label" id="bpLabelW" x="350" y="518">12500 MM</text>
                <text class="bp-label" id="bpLabelH" x="785" y="260" transform="rotate(90,785,260)">8200 MM</text>
                <!-- Furniture labels -->
                <text class="bp-label" id="bpLabelSofa" x="130" y="400">SOFA</text>
                <text class="bp-label" id="bpLabelTable" x="250" y="394">TABLE</text>
                <text class="bp-label" id="bpLabelShelf" x="494" y="348">SHELF</text>
                <text class="bp-label" id="bpLabelTV" x="610" y="366">MEDIA</text>
                <text class="bp-label" id="bpLabelLamp" x="12" y="338">LAMP</text>
                <text class="bp-label" id="bpLabelArt" x="142" y="94">ART</text>
            </svg>
        </div>

        <!-- Step 1: Structure -->
        <div class="rc-element rc-accent-wall" data-step="1"></div>
        <div class="rc-element rc-molding" data-step="1"></div>
        <div class="rc-element rc-window" data-step="1"></div>
        <!-- Step 2: Curtains -->
        <div class="rc-element rc-curtain-l" data-step="2"></div>
        <div class="rc-element rc-curtain-r" data-step="2"></div>
        <!-- Step 3: Seating -->
        <div class="rc-element rc-rug" data-step="3" id="rcRug"></div>
        <div class="rc-element rc-sofa" data-step="3">
            <div class="rc-sofa-back"></div>
            <div class="rc-sofa-seat"></div>
            <div class="rc-sofa-base"></div>
            <div class="rc-sofa-pillow1"></div>
            <div class="rc-sofa-pillow2"></div>
        </div>
        <div class="rc-element rc-table" data-step="3">
            <div class="rc-table-top"></div>
            <div class="rc-table-legs"></div>
        </div>
        <!-- Step 4: Storage -->
        <div class="rc-element rc-bookshelf" data-step="4">
            <div class="rc-shelf-body">
                <div class="rc-shelf-row">
                    <div class="rc-book" style="height:82%;background:#c9a96e"></div>
                    <div class="rc-book" style="height:90%;background:#8b5e3c"></div>
                    <div class="rc-book" style="height:70%;background:#d4a0a0"></div>
                    <div class="rc-book" style="height:85%;background:#5a7a6a"></div>
                </div>
                <div class="rc-shelf-row">
                    <div class="rc-book" style="height:88%;background:#7a5d4b"></div>
                    <div class="rc-book" style="height:72%;background:#c9a96e"></div>
                    <div class="rc-book" style="height:95%;background:#3a3025"></div>
                </div>
                <div class="rc-shelf-row">
                    <div class="rc-book" style="height:90%;background:#d4a0a0"></div>
                    <div class="rc-book" style="height:75%;background:#5a3d2b"></div>
                    <div class="rc-book" style="height:82%;background:#c67b5c"></div>
                    <div class="rc-book" style="height:70%;background:#4a8a5a"></div>
                </div>
                <div class="rc-shelf-row">
                    <div class="rc-book" style="height:80%;background:#c9a96e"></div>
                    <div class="rc-book" style="height:90%;background:#6b4423"></div>
                    <div class="rc-book" style="height:72%;background:#87CEEB"></div>
                </div>
            </div>
        </div>
        <div class="rc-element rc-tv" data-step="4">
            <div class="rc-tv-screen"></div>
            <div class="rc-tv-cabinet"></div>
        </div>
        <!-- Step 5: Lighting -->
        <div class="rc-element rc-lamp" data-step="5">
            <div class="rc-lamp-shade"></div>
            <div class="rc-lamp-pole"></div>
            <div class="rc-lamp-base"></div>
            <div class="rc-lamp-glow"></div>
        </div>
        <!-- Step 6: Decor -->
        <div class="rc-element rc-art" data-step="6">
            <div class="rc-art-frame">
                <div class="rc-art-inner"></div>
            </div>
        </div>
        <div class="rc-element rc-plant" data-step="6">
            <div class="rc-foliage"></div>
            <div class="rc-pot"></div>
        </div>
    </div>

    <div class="step-info" id="stepInfo">
        <div class="step-number" id="stepNumber">STEP 01 / 07</div>
        <h2 class="step-title" id="stepTitle">The <em>Empty Canvas</em></h2>
        <p class="step-desc" id="stepDesc">Every great interior begins with an empty room — a blank canvas waiting for
            its story to unfold.</p>
    </div>

    <div class="material-swatch" id="materialSwatch">
        <div class="ms-label">Material</div>
        <div class="ms-color" id="msColor" style="background:#e8ddd0"></div>
        <div class="ms-name" id="msName">Italian Plaster</div>
    </div>

    <div class="timeline-bar">
        <div class="timeline-fill" id="timelineFill"></div>
    </div>
    <div class="timeline-markers" id="timelineMarkers">
        <div class="tl-marker active" data-step="0">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Canvas</span>
        </div>
        <div class="tl-marker" data-step="1">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Structure</span>
        </div>
        <div class="tl-marker" data-step="2">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Fabric</span>
        </div>
        <div class="tl-marker" data-step="3">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Seating</span>
        </div>
        <div class="tl-marker" data-step="4">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Storage</span>
        </div>
        <div class="tl-marker" data-step="5">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Lighting</span>
        </div>
        <div class="tl-marker" data-step="6">
            <div class="tl-marker-dot"></div><span class="tl-marker-label">Decor</span>
        </div>
    </div>
    <span class="scroll-hint">Scroll to build the room</span>

    <script>
        (function () {
            'use strict';

            var cursorDot = document.getElementById('cursorDot');
            var cursorRing = document.getElementById('cursorRing');
            var timelineFill = document.getElementById('timelineFill');
            var stepNumber = document.getElementById('stepNumber');
            var stepTitle = document.getElementById('stepTitle');
            var stepDesc = document.getElementById('stepDesc');
            var materialSwatch = document.getElementById('materialSwatch');
            var msColor = document.getElementById('msColor');
            var msName = document.getElementById('msName');
            var markers = document.querySelectorAll('.tl-marker');
            var blueprintLayer = document.getElementById('blueprintLayer');
            var particlesEl = document.getElementById('particles');

            // Cursor
            var mx = 0, my = 0, ddx = 0, ddy = 0, rrx = 0, rry = 0;
            document.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });
            (function cl() {
                ddx += (mx - ddx) * 0.9; ddy += (my - ddy) * 0.9;
                rrx += (mx - rrx) * 0.12; rry += (my - rry) * 0.12;
                cursorDot.style.left = ddx + 'px'; cursorDot.style.top = ddy + 'px';
                cursorRing.style.left = rrx + 'px'; cursorRing.style.top = rry + 'px';
                requestAnimationFrame(cl);
            })();

            // Particles
            function spawnP() {
                var p = document.createElement('div');
                p.className = 'particle';
                var sz = Math.random() * 2 + 0.5;
                p.style.width = sz + 'px'; p.style.height = sz + 'px';
                p.style.background = 'rgba(201,169,110,' + (Math.random() * 0.4 + 0.1) + ')';
                p.style.left = (Math.random() * window.innerWidth) + 'px';
                p.style.top = (Math.random() * window.innerHeight) + 'px';
                particlesEl.appendChild(p);
                anime({ targets: p, opacity: [0, Math.random() * 0.4 + 0.1, 0], translateY: -(Math.random() * 70 + 30), duration: 5000 + Math.random() * 3000, easing: 'easeOutExpo', complete: function () { p.remove(); } });
            }
            setInterval(function () { spawnP(); spawnP(); }, 900);

            var steps = [
                { step: 0, title: 'The <em>Empty Canvas</em>', desc: 'Every great interior begins with an empty room — a blank canvas waiting for its story to unfold.', material: { color: '#e8ddd0', name: 'Italian Plaster' } },
                { step: 1, title: 'Walls & <em>Structure</em>', desc: 'Accent walls define zones. Moldings add character. The window frames the outside world as living artwork.', material: { color: '#374840', name: 'Forest Sage Paint' } },
                { step: 2, title: 'Soft <em>Furnishings</em>', desc: 'Curtains filter and frame the light. Fabric softens hard edges, creating warmth and a sense of embrace.', material: { color: '#c9a96e', name: 'Sheer Linen — Gold' } },
                { step: 3, title: 'Core <em>Seating</em>', desc: 'The sofa anchors the room. A rug defines the conversation zone. The coffee table becomes the social centre.', material: { color: '#6a8a7a', name: 'Velvet — Sage Green' } },
                { step: 4, title: 'Storage & <em>Entertainment</em>', desc: 'Bookshelves tell your story through curated objects. The media unit grounds the room\'s focal wall.', material: { color: '#6a5040', name: 'Walnut Hardwood' } },
                { step: 5, title: 'Ambient <em>Lighting</em>', desc: 'A floor lamp creates layered light. Warm pooling light transforms the atmosphere and sets the mood.', material: { color: '#f5e6d0', name: 'Linen Shade — Warm' } },
                { step: 6, title: 'Finishing <em>Touches</em>', desc: 'Wall art, plants, and accessories bring personality. This is where the room finds its soul.', material: { color: '#4a8a5a', name: 'Living Greenery' } },
            ];

            // ── SVG Blueprint draw-in ──
            var bpStructs = blueprintLayer.querySelectorAll('.bp-struct');
            var bpDims = blueprintLayer.querySelectorAll('.bp-dim');
            var bpLabels = blueprintLayer.querySelectorAll('.bp-label');

            bpStructs.forEach(function (el) {
                var len = el.getTotalLength ? el.getTotalLength() : 1000;
                el.style.strokeDasharray = len;
                el.style.strokeDashoffset = len;
            });
            bpDims.forEach(function (el) {
                if (el.getTotalLength) {
                    var len = el.getTotalLength();
                    el.style.strokeDasharray = len;
                    el.style.strokeDashoffset = len;
                }
            });

            // Draw blueprint on entrance
            anime({
                targets: bpStructs,
                strokeDashoffset: [anime.setDashoffset, 0],
                opacity: [0, 0.5],
                duration: 2500,
                delay: anime.stagger(100, { from: 'center' }),
                easing: 'easeInOutCubic',
            });
            anime({
                targets: bpDims,
                strokeDashoffset: [anime.setDashoffset, 0],
                opacity: [0, 0.4],
                duration: 1500,
                delay: anime.stagger(150, { start: 1500 }),
                easing: 'easeOutExpo',
            });
            anime({
                targets: bpLabels,
                opacity: [0, 0.5],
                duration: 600,
                delay: anime.stagger(100, { start: 2000 }),
                easing: 'easeOutExpo',
            });

            // Blueprint pulse
            anime({
                targets: bpStructs,
                opacity: [0.3, 0.6, 0.3],
                duration: 5000,
                easing: 'easeInOutSine',
                loop: true,
                delay: anime.stagger(80),
            });

            // Entrance
            anime({ targets: '.room-canvas', opacity: [0, 1], translateY: [25, 0], duration: 1200, easing: 'easeOutExpo' });
            anime({ targets: '#stepInfo', opacity: [0, 1], translateY: [15, 0], duration: 900, delay: 400, easing: 'easeOutExpo' });

            var revealedSteps = {};
            var totalScroll = document.querySelector('.scroll-spacer').offsetHeight - window.innerHeight;
            var lastStep = -1;
            var targetBPOpacity = 0.5;
            var currentBPOpacity = 0.5;

            function revealStep(stepNum) {
                if (revealedSteps[stepNum]) return;
                revealedSteps[stepNum] = true;

                var elements = document.querySelectorAll('.rc-element[data-step="' + stepNum + '"]');
                anime({
                    targets: elements,
                    opacity: [0, 1],
                    translateY: [15, 0],
                    scale: [0.9, 1],
                    delay: anime.stagger(120, { from: 'center' }),
                    duration: 900,
                    easing: 'easeOutElastic(1, 0.7)',
                });

                // Corresponding blueprint lines fade out
                var bpTargets = [];
                if (stepNum === 1) bpTargets = ['#bpAccent', '#bpWindow'];
                if (stepNum === 3) bpTargets = ['#bpSofa', '#bpTable'];
                if (stepNum === 4) bpTargets = ['#bpShelf', '#bpTV'];
                if (stepNum === 5) bpTargets = ['#bpLamp'];
                if (stepNum === 6) bpTargets = ['#bpArt'];

                if (bpTargets.length) {
                    anime({
                        targets: bpTargets.join(', '),
                        opacity: 0.1,
                        strokeDashoffset: function (el) { return el.getTotalLength ? el.getTotalLength() * 0.5 : 0; },
                        duration: 800,
                        easing: 'easeOutExpo',
                        delay: 300,
                    });
                    // Fade corresponding labels
                    bpTargets.forEach(function (sel) {
                        var labelId = sel.replace('#bp', '#bpLabel');
                        anime({ targets: labelId, opacity: 0.1, duration: 600, easing: 'easeOutExpo', delay: 400 });
                    });
                }
            }

            function hideStep(stepNum) {
                if (!revealedSteps[stepNum]) return;
                delete revealedSteps[stepNum];
                var elements = document.querySelectorAll('.rc-element[data-step="' + stepNum + '"]');
                anime({
                    targets: elements,
                    opacity: 0, translateY: 15, scale: 0.9,
                    duration: 400, easing: 'easeOutExpo',
                });

                var bpTargets = [];
                if (stepNum === 1) bpTargets = ['#bpAccent', '#bpWindow'];
                if (stepNum === 3) bpTargets = ['#bpSofa', '#bpTable'];
                if (stepNum === 4) bpTargets = ['#bpShelf', '#bpTV'];
                if (stepNum === 5) bpTargets = ['#bpLamp'];
                if (stepNum === 6) bpTargets = ['#bpArt'];

                if (bpTargets.length) {
                    anime({
                        targets: bpTargets.join(', '),
                        opacity: 0.5,
                        strokeDashoffset: 0,
                        duration: 600,
                        easing: 'easeOutExpo',
                    });
                    bpTargets.forEach(function (sel) {
                        var labelId = sel.replace('#bp', '#bpLabel');
                        anime({ targets: labelId, opacity: 0.5, duration: 500, easing: 'easeOutExpo' });
                    });
                }
            }

            function updateStepInfo(index) {
                var data = steps[index];
                if (!data) return;
                anime({
                    targets: '#stepInfo',
                    opacity: [1, 0], translateY: [0, -8],
                    duration: 200, easing: 'easeOutExpo',
                    complete: function () {
                        stepNumber.textContent = 'STEP 0' + (index + 1) + ' / 07';
                        stepTitle.innerHTML = data.title;
                        stepDesc.textContent = data.desc;
                        anime({ targets: '#stepInfo', opacity: [0, 1], translateY: [8, 0], duration: 500, easing: 'easeOutExpo' });
                    }
                });

                // Material swatch
                if (data.material) {
                    materialSwatch.classList.add('visible');
                    msColor.style.background = data.material.color;
                    msName.textContent = data.material.name;
                    anime({ targets: '.ms-color', scale: [0.8, 1], duration: 500, easing: 'easeOutElastic(1, 0.5)' });
                }
            }

            // Smooth fill target
            var targetFill = 0;
            var currentFill = 0;

            window.addEventListener('scroll', function () {
                var scrollY = window.scrollY;
                var progress = Math.min(scrollY / totalScroll, 1);
                targetFill = progress * 100;

                var currentStep = Math.min(Math.floor(progress * steps.length), steps.length - 1);

                markers.forEach(function (m) {
                    var ms = parseInt(m.getAttribute('data-step'));
                    if (ms <= currentStep) m.classList.add('active');
                    else m.classList.remove('active');
                });

                for (var s = 1; s <= 6; s++) {
                    if (s <= currentStep) revealStep(s);
                    else hideStep(s);
                }

                if (currentStep !== lastStep) {
                    lastStep = currentStep;
                    updateStepInfo(currentStep);
                }

                // Blueprint fades as room fills
                targetBPOpacity = Math.max(0.1, 0.5 - progress * 0.5);
            });

            // Smooth lerp for timeline fill and blueprint opacity
            (function lerpLoop() {
                currentFill += (targetFill - currentFill) * 0.08;
                timelineFill.style.width = currentFill + '%';

                currentBPOpacity += (targetBPOpacity - currentBPOpacity) * 0.05;
                blueprintLayer.style.opacity = currentBPOpacity;

                requestAnimationFrame(lerpLoop);
            })();

        })();
    </script>
</body>

</html>
